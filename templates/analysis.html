<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis - Plant Disease Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep: #1a3a1a;
            --green-mid: #2d6a2d;
            --green-light: #4caf50;
            --green-bright: #76c442;
            --gold: #c9a84c;
            --red-alert: #ff6b6b;
            --cream: #f5f0e8;
            --white: #ffffff;
            --glass: rgba(255,255,255,0.07);
            --glass-hover: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.14);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--green-deep);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 15% 15%, rgba(76,175,80,0.16) 0%, transparent 55%),
                radial-gradient(ellipse 60% 70% at 85% 85%, rgba(118,196,66,0.12) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(26,58,26,0.8) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Particle leaves */
        .leaf-particle {
            position: fixed;
            border-radius: 50% 0 50% 0;
            background: rgba(118,196,66,0.2);
            animation: floatLeaf linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes floatLeaf {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* ─── HEADER ─── */
        header {
            position: relative;
            z-index: 10;
            padding: 42px 40px 28px;
            text-align: center;
            background: rgba(10,28,10,0.5);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            animation: fadeDown 0.7s ease both;
        }
        header::after {
            content: '🔬';
            position: absolute;
            left: 50%; bottom: -18px;
            transform: translateX(-50%);
            font-size: 26px;
            background: var(--green-deep);
            padding: 0 12px;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 4.5vw, 44px);
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, var(--green-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── NAV ─── */
        nav {
            position: relative;
            z-index: 10;
            padding: 28px 20px 16px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            animation: fadeDown 0.85s ease both;
        }
        nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        nav a:hover {
            color: #fff;
            border-color: var(--glass-border);
            background: var(--glass);
            letter-spacing: 1.6px;
        }

        /* ─── CONTAINER ─── */
        .container {
            position: relative;
            z-index: 10;
            max-width: 820px;
            margin: 56px auto 120px;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ─── RESULT CARD ─── */
        .result-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            overflow: hidden;
            animation: fadeUp 0.9s ease both;
            position: relative;
        }
        .result-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green-light), var(--green-bright), var(--gold));
        }

        .prediction {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .prediction-image {
            position: relative;
            overflow: hidden;
        }
        .prediction-image img {
            width: 100%;
            height: 100%;
            min-height: 260px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .prediction-image:hover img { transform: scale(1.04); }
        .prediction-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 60%, var(--green-deep) 100%);
        }

        .prediction-details {
            padding: 36px 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
        }

        .prediction-details .label {
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--green-bright);
            font-weight: 500;
        }

        .prediction-details h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(20px, 3vw, 28px);
            font-weight: 700;
            line-height: 1.25;
            color: #fff;
        }

        /* Confidence meter */
        .confidence-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .confidence-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .confidence-row .conf-label {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
        }
        .confidence-row .conf-value {
            font-size: 22px;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--green-bright);
        }
        .progress-bar-track {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 100px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 100px;
            background: linear-gradient(90deg, var(--green-light), var(--green-bright));
            width: {{ accuracy }}%;
            animation: fillBar 1.2s cubic-bezier(0.22,1,0.36,1) both;
            animation-delay: 0.4s;
            /* color overridden by JS below */
        }
        @keyframes fillBar {
            from { width: 0%; }
            to { width: {{ accuracy }}%; }
        }

        /* Accuracy color classes */
        .acc-green  { background: linear-gradient(90deg, #4caf50, #76c442) !important; }
        .acc-yellow { background: linear-gradient(90deg, #f9ca24, #f0e030) !important; }
        .acc-orange { background: linear-gradient(90deg, #f0932b, #ffbe76) !important; }
        .acc-red    { background: linear-gradient(90deg, #eb4d4b, #ff7979) !important; }

        .conf-green  { color: #76c442 !important; }
        .conf-yellow { color: #f9ca24 !important; }
        .conf-orange { color: #f0932b !important; }
        .conf-red    { color: #eb4d4b !important; }

        /* ─── RECOMMENDATIONS ─── */
        .recommendations {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(14px);
            padding: 32px 36px;
            animation: fadeUp 1s ease 0.15s both;
            position: relative;
            overflow: hidden;
        }
        .recommendations::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), #e8c96a, var(--gold));
        }
        .recommendations .rec-icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
        }
        .recommendations h3 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--gold);
        }
        .recommendations p {
            font-size: 16px;
            line-height: 1.85;
            color: rgba(255,255,255,0.82);
            font-weight: 300;
        }

        /* ─── CHART CARD ─── */
        .accuracy-chart {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(14px);
            padding: 32px 36px;
            animation: fadeUp 1s ease 0.25s both;
            position: relative;
            overflow: hidden;
        }
        .accuracy-chart::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #56ccf2, #2f80ed, var(--green-bright));
        }
        .accuracy-chart h3 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }
        canvas {
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            padding: 10px;
            width: 100% !important;
            max-height: 220px;
        }

        /* ─── FOOTER ─── */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            z-index: 20;
            text-align: center;
            padding: 15px 20px;
            background: rgba(10,25,10,0.88);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            font-size: 13px;
            color: rgba(255,255,255,0.45);
        }
        footer span { color: var(--green-bright); }

        /* ─── KEYFRAMES ─── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            .prediction { grid-template-columns: 1fr; }
            .prediction-image img { min-height: 200px; }
            .prediction-image::after { background: linear-gradient(to bottom, transparent 60%, var(--green-deep) 100%); }
            .prediction-details { padding: 24px 24px; }
            .recommendations, .accuracy-chart { padding: 24px; }
        }
    </style>
</head>
<body>

    <div class="leaf-particle" style="left:8%;  width:10px;height:10px; animation-duration:15s; animation-delay:0s;"></div>
    <div class="leaf-particle" style="left:30%; width:6px; height:6px;  animation-duration:19s; animation-delay:4s;"></div>
    <div class="leaf-particle" style="left:65%; width:11px;height:11px; animation-duration:13s; animation-delay:7s;"></div>
    <div class="leaf-particle" style="left:85%; width:7px; height:7px;  animation-duration:17s; animation-delay:2s;"></div>

    <header>
        <h1>Prediction Result</h1>
    </header>

    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('upload') }}">Upload</a>
        <a href="{{ url_for('history') }}">History</a>
        <a href="{{ url_for('about') }}">About Us</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>

    <div class="container">

        <!-- Result Card -->
        <div class="result-card">
            <div class="prediction">
                <div class="prediction-image">
                    <img src="{{ url_for('static', filename='uploads/' ~ filename) }}" alt="Uploaded Leaf">
                </div>
                <div class="prediction-details">
                    <span class="label">✦ Analysis Complete</span>
                    <h2>{{ prediction }}</h2>
                    <div class="confidence-block">
                        <div class="confidence-row">
                            <span class="conf-label">Prediction Confidence</span>
                            <span class="conf-value">{{ accuracy }}%</span>
                        </div>
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recommendations -->
        <div class="recommendations">
            <span class="rec-icon"></span>
            <h3>Recommendations &amp; Cure</h3>
            <p>{{ recommendation }}</p>
        </div>

        <!-- Chart -->
        <div class="accuracy-chart">
            <h3>Prediction Accuracy Chart</h3>
            <canvas id="accuracyChart"></canvas>
        </div>

    </div>

    <footer>
        &copy; 2026 <span>Plant Disease Detection</span>. All rights reserved.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // ── Accuracy-based color logic ──────────────────────────────
        const accuracy = {{ accuracy }};

        function getAccuracyColor(val) {
            if (val <= 50)              return { bar: 'rgba(118,196,66,0.85)',  border: 'rgba(118,196,66,1)',  label: 'green',  barClass: 'acc-green',  confClass: 'conf-green'  };
            if (val > 50 && val <= 75)  return { bar: 'rgba(249,202,36,0.85)', border: 'rgba(249,202,36,1)',  label: 'yellow', barClass: 'acc-yellow', confClass: 'conf-yellow' };
            if (val > 75 && val <= 90)  return { bar: 'rgba(240,147,43,0.85)', border: 'rgba(240,147,43,1)',  label: 'orange', barClass: 'acc-orange', confClass: 'conf-orange' };
            return                             { bar: 'rgba(235,77,75,0.85)',   border: 'rgba(235,77,75,1)',   label: 'red',    barClass: 'acc-red',    confClass: 'conf-red'    };
        }

        const color = getAccuracyColor(accuracy);

        // Apply color to progress bar and confidence value
        document.querySelector('.progress-bar-fill').classList.add(color.barClass);
        document.querySelector('.conf-value').classList.add(color.confClass);

        // ── Chart ───────────────────────────────────────────────────
        const ctx = document.getElementById('accuracyChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Prediction Confidence', 'Max (100%)'],
                datasets: [{
                    label: 'Accuracy (%)',
                    data: [accuracy, 100],
                    backgroundColor: [ color.bar, 'rgba(255,255,255,0.08)' ],
                    borderColor:     [ color.border, 'rgba(255,255,255,0.15)' ],
                    borderWidth: 1,
                    borderRadius: 8,
                    borderSkipped: false
                }]
            },
            options: {
                animation: { duration: 1200, easing: 'easeOutQuart' },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        ticks: { color: 'rgba(255,255,255,0.5)', font: { family: 'DM Sans' } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: 'rgba(255,255,255,0.6)', font: { family: 'DM Sans', size: 13 } }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(10,30,10,0.9)',
                        borderColor: color.border,
                        borderWidth: 1,
                        titleColor: color.bar,
                        bodyColor: '#fff',
                        titleFont: { family: 'DM Sans', weight: '500' },
                        bodyFont: { family: 'DM Sans' }
                    }
                }
            }
        });

        // ── Color-coded legend badge ────────────────────────────────
        const labelMap = {
            green:  { text: 'Low Risk',       bg: 'rgba(118,196,66,0.18)',  border: 'rgba(118,196,66,0.5)'  },
            yellow: { text: 'Moderate Risk',   bg: 'rgba(249,202,36,0.18)', border: 'rgba(249,202,36,0.5)' },
            orange: { text: 'High Risk',       bg: 'rgba(240,147,43,0.18)', border: 'rgba(240,147,43,0.5)' },
            red:    { text: 'Critical Risk',   bg: 'rgba(235,77,75,0.18)',  border: 'rgba(235,77,75,0.5)'  },
        };
        const info = labelMap[color.label];
        const badge = document.createElement('div');
        badge.style.cssText = `
            display:inline-flex; align-items:center; gap:8px;
            margin-top:14px; padding:6px 16px;
            background:${info.bg}; border:1px solid ${info.border};
            border-radius:50px; font-size:12px; font-weight:500;
            letter-spacing:1px; text-transform:uppercase;
            color:${color.border};
        `;
        badge.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${color.border};display:inline-block;box-shadow:0 0 6px ${color.border}"></span>${info.text}`;
        document.querySelector('.accuracy-chart').appendChild(badge);
    </script>
</body>
</html>
