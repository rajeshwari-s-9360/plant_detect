<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Plant Disease Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep: #1a3a1a;
            --green-mid: #2d6a2d;
            --green-light: #4caf50;
            --green-bright: #76c442;
            --gold: #c9a84c;
            --white: #ffffff;
            --glass: rgba(255,255,255,0.07);
            --glass-hover: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.14);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--green-deep);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 75% 60% at 15% 20%, rgba(76,175,80,0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 70% at 85% 80%, rgba(118,196,66,0.13) 0%, transparent 50%),
                radial-gradient(ellipse 55% 55% at 50% 50%, rgba(26,58,26,0.75) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating particles */
        .leaf-particle {
            position: fixed;
            border-radius: 50% 0 50% 0;
            background: rgba(118,196,66,0.18);
            animation: floatLeaf linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes floatLeaf {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* ─── HEADER ─── */
        header {
            position: relative;
            z-index: 10;
            padding: 42px 40px 28px;
            text-align: center;
            background: rgba(10,28,10,0.5);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            animation: fadeDown 0.7s ease both;
        }
        header::after {
            content: '';
            position: absolute;
            left: 50%; bottom: -18px;
            transform: translateX(-50%);
            font-size: 26px;
            background: var(--green-deep);
            padding: 0 12px;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 4.5vw, 44px);
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, var(--green-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── NAV ─── */
        nav {
            position: relative;
            z-index: 10;
            padding: 28px 20px 16px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            animation: fadeDown 0.85s ease both;
        }
        nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        nav a:hover, nav a.active {
            color: #fff;
            border-color: var(--glass-border);
            background: var(--glass);
            letter-spacing: 1.6px;
        }

        /* ─── SIGNUP CARD ─── */
        .signup-container {
            position: relative;
            z-index: 10;
            max-width: 420px;
            margin: 56px auto 100px;
            padding: 0 24px;
            animation: fadeUp 0.9s ease both;
        }

        .form-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 44px 40px 40px;
            backdrop-filter: blur(18px);
            position: relative;
            overflow: hidden;
        }
        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green-light), var(--green-bright), var(--gold));
        }

        .form-label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--green-bright);
            font-weight: 500;
            text-align: center;
            display: block;
            margin-bottom: 10px;
        }

        .form-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.75) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Input group */
        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
            z-index: 2;
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="password"] {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.38);
        }
        .input-group input:focus {
            border-color: rgba(118,196,66,0.55);
            background: rgba(255,255,255,0.10);
            box-shadow: 0 0 0 3px rgba(118,196,66,0.12);
        }

        /* Submit button */
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--green-light), var(--green-bright));
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
            box-shadow: 0 4px 20px rgba(76,175,80,0.35);
        }
        button[type="submit"]:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(76,175,80,0.5);
        }
        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 20px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }
        .divider span {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* Login link */
        .login-link {
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.55);
        }
        .login-link a {
            color: var(--green-bright);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .login-link a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* ─── FOOTER ─── */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            z-index: 20;
            text-align: center;
            padding: 15px 20px;
            background: rgba(10,25,10,0.88);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            font-size: 13px;
            color: rgba(255,255,255,0.45);
        }
        footer span { color: var(--green-bright); }

        /* ─── KEYFRAMES ─── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .form-card { padding: 32px 24px 28px; }
        }
    </style>
</head>
<body>

    <div class="leaf-particle" style="left:8%;  width:10px;height:10px; animation-duration:15s; animation-delay:0s;"></div>
    <div class="leaf-particle" style="left:30%; width:6px; height:6px;  animation-duration:19s; animation-delay:4s;"></div>
    <div class="leaf-particle" style="left:65%; width:11px;height:11px; animation-duration:13s; animation-delay:7s;"></div>
    <div class="leaf-particle" style="left:85%; width:7px; height:7px;  animation-duration:17s; animation-delay:2s;"></div>

    <header>
        <h1>Plant Disease Detection</h1>
    </header>

    <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('about') }}">About Us</a>
        <a href="{{ url_for('signup') }}" class="active">Sign Up</a>
        <a href="{{ url_for('login') }}">Login</a>
    </nav>

    <div class="signup-container">
        <div class="form-card">
            <span class="form-label">✦ Join Us Today</span>
            <h2>Create Account</h2>

            <form action="{{ url_for('signup') }}" method="POST">
                <div class="input-group">
                    <span class="input-icon"></span>
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <span class="input-icon"></span>
                    <input type="email" name="email" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <span class="input-icon"></span>
                    <input type="password" name="password" placeholder="Password (min. 6 characters)" required>
                </div>
                <button type="submit">Create Account</button>
            </form>

            <div class="divider"><span>already a member?</span></div>

            <div class="login-link">
                Already have an account? <a href="{{ url_for('login') }}">Login here</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 <span>Plant Disease Detection</span>. All rights reserved.
    </footer>

    <script>
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            const password = form.password.value;
            if (password.length < 6) {
                alert("Password must be at least 6 characters long");
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
